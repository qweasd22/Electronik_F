{% extends 'dashboard/base.html' %}

{% block title %}Удаление товара{% endblock %}
{% block page_title %}Удаление товара{% endblock %}

{% block content %}
<div class="dashboard-top-actions">
    <a href="{% url 'dashboard:product_list' %}" class="dashboard-btn dashboard-btn--ghost">← К списку товаров</a>
</div>

<section class="dashboard-panel">
    <div class="dashboard-panel__head">
        <h2>Подтверждение удаления</h2>
    </div>
    <div class="dashboard-panel__body">
        <p>Вы действительно хотите удалить товар <strong>{{ product.name }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <div class="dashboard-form-actions">
                <button type="submit" class="dashboard-btn dashboard-btn--danger">Удалить</button>
                <a href="{% url 'dashboard:product_list' %}" class="dashboard-btn dashboard-btn--ghost">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
